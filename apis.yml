aid: jules-google
name: Jules
description: >-
  Jules is Google's autonomous, asynchronous AI coding agent, developed inside
  Google Labs and powered by the Gemini family of models (currently Gemini 2.5
  Pro on the free tier and Gemini 3 Pro on paid tiers). Jules connects to a
  user's GitHub repositories, clones the target repo into a sandboxed Google
  Cloud VM, generates a multi-step plan, and then executes coding tasks such
  as bug fixes, refactors, dependency bumps, test authoring, and small feature
  builds, ultimately opening a pull request for human review. Jules ships
  three surfaces beyond the web app at jules.google.com: a documented REST
  API in alpha at jules.googleapis.com/v1alpha (Sources, Sessions, Activities)
  authenticated via X-Goog-Api-Key, a lightweight CLI called Jules Tools
  installable via npm, and a Gemini CLI extension that exposes Jules as a
  /jules slash command. Access is gated to Google account holders and the API
  is experimental. Jules is sold as part of the Google AI subscription
  bundles, with a free introductory plan (15 tasks/day, 3 concurrent),
  Google AI Pro at $19.99/month (100 tasks/day, 15 concurrent, Gemini 3 Pro),
  and Google AI Ultra at $124.99/month (300 tasks/day, 60 concurrent,
  priority Gemini 3 Pro access).
