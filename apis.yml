apis:
  - aid: jules-google:jules-api
    name: Jules API
    description: >-
      Alpha REST API for Google's Jules autonomous coding agent. Exposes
      Sources (connected GitHub repositories), Sessions (units of work
      against a source with a prompt and optional plan-approval workflow),
      and Activities (per-session events such as plans, messages, and
      progress updates). Supports creating sessions, listing sources and
      sessions, approving plans, sending messages to the agent, and listing
      activities, with optional automationMode AUTO_CREATE_PR for automatic
      pull-request creation. Authenticated via the X-Goog-Api-Key HTTP
      header; API keys are generated in the Jules web app Settings (maximum
      three active keys per user) and are auto-disabled if leaked.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.google.com/jules/api
    baseURL: https://jules.googleapis.com/v1alpha
